[HTTP]
# Bind address for the API server
HOST = 0.0.0.0
PORT = 8000
# Seconds for HTTP request body timeout
REQUEST_TIMEOUT_SECS = 30

[POSTGRES]
# Connection URL or build from parts below. If empty, USER/PASSWORD/IP/PORT/NAME are used.
# Example: postgresql://user:pass@host:5432/dbname
CONNECTION_STRING =
# Used when CONNECTION_STRING is empty
USER = postgres
PASSWORD = changeme
IP = 127.0.0.1
PORT = 5432
NAME = app
# SQLx: max connections in the pool
MAX_CONNECTIONS = 5

[REDIS]
URL = redis://127.0.0.1:6379/0
# Optional password for redis://:password@host/ when URL has no creds
PASSWORD =

[DOCS]
# If set, /api/docs requires Basic auth (user:pass). Empty = public docs in dev
BASIC_USER =
BASIC_PASS =

[APP]
# Shown in health / welcome example
NAME = rust-axum-template
ENV = development
